<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Meal Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    /* ── HA Theme CSS variables (defaults = dark; overridden by applyHATheme()) ── */
    :root {
      --mp-bg:         #111827;
      --mp-surface:    #1f2937;
      --mp-text:       #f9fafb;
      --mp-text-muted: #6b7280;
      --mp-border:     #374151;
      --mp-primary:    #2563eb;
    }

    body {
      background: var(--mp-bg);
      color: var(--mp-text);
      font-family: ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Map Tailwind's static color classes to theme variables */
    body .text-white                    { color: var(--mp-text)       !important; }
    body .text-gray-400,
    body .text-gray-500                 { color: var(--mp-text-muted) !important; }
    body .text-gray-600,
    body .text-gray-700                 { color: color-mix(in srgb, var(--mp-text-muted) 55%, transparent) !important; }
    /* Preserve semantic tag text colors */
    .tag                                { color: unset !important; }

    .day-card {
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
    }
    .day-card:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .day-card:active { transform: scale(0.97); }

    /* Day card theme variants */
    .mp-day-default { background: var(--mp-surface); border: 1px solid var(--mp-border); }
    .mp-day-today   {
      background: color-mix(in srgb, var(--mp-primary) 25%, var(--mp-surface));
      border: 1px solid color-mix(in srgb, var(--mp-primary) 55%, transparent);
    }
    .mp-day-nothing { background: var(--mp-bg); border: 1px solid var(--mp-border); opacity: 0.6; }
    .mp-day-dish    { background: var(--mp-surface); border: 1px solid rgba(34,197,94,0.4); }

    /* Accent color for today's date number */
    .mp-accent { color: var(--mp-primary) !important; }

    .btn {
      border-radius: 0.75rem;
      font-weight: 600;
      padding: 0.55rem 1rem;
      transition: background 0.12s, transform 0.1s;
      cursor: pointer;
      border: none;
      font-size: 0.875rem;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary  { background: var(--mp-primary); color: #fff !important; }
    .btn-primary:hover  { background: color-mix(in srgb, var(--mp-primary) 80%, black); }
    .btn-success  { background: #16a34a; color: #fff !important; }
    .btn-success:hover  { background: #15803d; }
    .btn-warn     { background: #d97706; color: #fff !important; }
    .btn-warn:hover     { background: #b45309; }
    .btn-danger   { background: #dc2626; color: #fff !important; }
    .btn-danger:hover   { background: #b91c1c; }
    .btn-neutral  { background: var(--mp-surface); color: var(--mp-text) !important; border: 1px solid var(--mp-border); }
    .btn-neutral:hover  { background: var(--mp-border); }
    .btn-violet   { background: #7c3aed; color: #fff !important; }
    .btn-violet:hover   { background: #6d28d9; }

    .suggestion-card {
      background: var(--mp-surface);
      border: 1px solid var(--mp-border);
      border-radius: 1rem;
      padding: 0.75rem 0.875rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.12s;
    }
    .suggestion-card:hover { border-color: var(--mp-text-muted); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: var(--mp-surface);
      border-radius: 1.25rem;
      width: 100%; max-width: 540px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    /* "Currently planned" inner box */
    .modal .bg-gray-800 { background: color-mix(in srgb, var(--mp-bg) 50%, var(--mp-surface)) !important; }

    .tag {
      display: inline-block;
      border-radius: 9999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--mp-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .divider {
      border-top: 1px solid var(--mp-border);
      margin: 1rem 0;
    }

    /* Tooltip for reject buttons */
    .reject-btn-group {
      display: flex;
      gap: 0.375rem;
      shrink: 0;
    }
  </style>
</head>
<body x-data="mealPlanner()" x-init="init()" x-cloak>

  <div class="max-w-4xl mx-auto px-3 py-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-4 gap-2">
      <div class="min-w-0">
        <h1 class="text-xl font-bold text-white leading-tight">🍽️ Meal Planner</h1>
        <p class="text-gray-500 text-xs mt-0.5 truncate" x-text="weekLabel"></p>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button class="btn btn-neutral px-3" @click="loadPlan" x-text="S.today"></button>
        <button
          class="btn btn-neutral px-2 text-xs font-mono"
          @click="setLang(lang === 'de' ? 'en' : 'de')"
          x-text="lang === 'de' ? 'EN' : 'DE'"
          title="Switch language"
        ></button>
      </div>
    </div>

    <!-- Week grid — 1 col on small, 3 col on medium+, 4 col on large -->
    <div class="grid grid-cols-2 sm:grid-cols-7 gap-2.5">
      <template x-for="day in weekDays" :key="day.iso">
        <div
          class="day-card rounded-2xl px-3.5 py-4 flex flex-col gap-2"
          :class="dayCardClass(day)"
          @click="openDay(day)"
        >
          <!-- Date row -->
          <div class="flex items-baseline justify-between">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide" x-text="day.weekday"></span>
            <span
              class="text-lg font-bold leading-none"
              :class="day.isToday ? 'mp-accent' : ''"
              x-text="day.dayNum"
            ></span>
          </div>

          <!-- Meal status -->
          <template x-if="plan[day.iso]">
            <div>
              <span
                x-show="!['dish','custom'].includes(plan[day.iso].type)"
                class="tag" :class="typeTagClass(plan[day.iso].type)" x-text="typeLabel(plan[day.iso].type)"
              ></span>
              <p
                class="text-sm font-normal text-white mt-1 leading-tight line-clamp-2"
                x-text="plan[day.iso].dish_name || ''"
                x-show="plan[day.iso].dish_name"
              ></p>
            </div>
          </template>
          <template x-if="!plan[day.iso]">
            <p class="text-xs text-gray-600 italic" x-text="S.notPlanned"></p>
          </template>
        </div>
      </template>
    </div>

    <!-- Footer links -->
    <div class="mt-5 text-center flex items-center justify-center gap-4">
      <button class="text-gray-600 text-xs hover:text-gray-400 underline" @click="openDishManager()" x-text="S.manageDishes"></button>
      <span class="text-gray-700 text-xs">·</span>
      <a class="text-gray-600 text-xs hover:text-gray-400 underline" href="/api/meal_planner/history.csv" download="meal-history.csv" x-text="S.downloadHistory"></a>
    </div>
  </div>

  <!-- ================================================================
       DAY PLANNING MODAL
  ================================================================ -->
  <div class="modal-overlay" x-show="modalOpen" x-transition @click.self="closeModal">
    <div class="modal" x-show="modalOpen" x-transition>

      <!-- Modal header -->
      <div class="flex items-start justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-white leading-tight" x-text="activeDay?.label"></h2>
          <p class="text-gray-500 text-xs mt-0.5" x-text="activeDay ? new Intl.DateTimeFormat(lang, {day:'numeric', month:'long', year:'numeric'}).format(new Date(activeDay.iso + 'T12:00')) : ''"></p>
        </div>
        <button class="text-gray-500 hover:text-white text-2xl leading-none ml-3 shrink-0" @click="closeModal">×</button>
      </div>

      <!-- ── Already planned: show summary + change/delete ── -->
      <template x-if="plan[activeDay?.iso] && !editMode">
        <div>
          <div class="bg-gray-800 rounded-xl p-3.5 mb-3">
            <p class="text-xs text-gray-500 mb-1" x-text="S.currentlyPlanned"></p>
            <span class="tag" :class="typeTagClass(plan[activeDay?.iso]?.type)" x-text="typeLabel(plan[activeDay?.iso]?.type)"></span>
            <span class="ml-2 font-semibold text-white text-sm" x-text="plan[activeDay?.iso]?.dish_name"></span>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-neutral flex-1" @click="startEdit()" x-text="S.change"></button>
            <button class="btn btn-danger" @click="clearDay(activeDay.iso)" x-text="S.delete"></button>
          </div>
        </div>
      </template>

      <!-- ── Planning UI ── -->
      <template x-if="!plan[activeDay?.iso] || editMode">
        <div>

          <!-- Loading -->
          <template x-if="loadingSuggestions">
            <div class="text-center py-8 text-gray-500">
              <div class="text-3xl mb-2">⏳</div>
              <p x-text="S.loadingSuggestions"></p>
            </div>
          </template>

          <template x-if="!loadingSuggestions">
            <div>

              <!-- Suggestions -->
              <p class="section-label" x-text="S.suggestionsLabel"></p>

              <template x-for="dish in suggestions" :key="dish.id">
                <div class="suggestion-card">
                  <!-- Dish info -->
                  <div class="flex items-start justify-between gap-3 mb-2">
                    <div class="min-w-0">
                      <p class="font-semibold text-white text-sm leading-snug" x-text="dish.name"></p>
                      <p class="text-xs text-gray-500 mt-0.5"
                        x-text="dish.last_used
                          ? S.lastCooked + ' ' + formatDate(dish.last_used)
                          : S.neverCooked"
                      ></p>
                    </div>
                  </div>
                  <!-- Action buttons -->
                  <div class="flex gap-1.5">
                    <!-- Accept -->
                    <button
                      class="btn btn-success flex-1 text-xs"
                      @click="acceptDish(dish)"
                      :title="S.acceptTitle"
                    >✓ <span x-text="S.accept"></span></button>

                    <!-- Not today (session skip) -->
                    <button
                      class="btn btn-neutral text-xs px-2"
                      @click="rejectDish(dish, 'session')"
                      :disabled="rejecting"
                      :title="S.notTodayTitle"
                    >↷ <span x-text="S.notToday"></span></button>

                    <!-- Block 2 weeks -->
                    <button
                      class="btn btn-danger text-xs px-2"
                      @click="rejectDish(dish, 'temporary')"
                      :disabled="rejecting"
                      :title="S.blockTitle"
                    >✕ <span x-text="S.block"></span></button>
                  </div>
                </div>
              </template>

              <template x-if="suggestions.length === 0">
                <p class="text-gray-500 italic text-sm py-2 text-center" x-text="S.noMoreSuggestions"></p>
              </template>

              <!-- Custom entry + dish picker -->
              <p class="section-label" x-text="S.ownEntry"></p>
              <div class="flex gap-2 mb-2">
                <input
                  type="text"
                  x-model="customText"
                  :placeholder="S.ownEntryPlaceholder"
                  class="flex-1 min-w-0 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm"
                  @keydown.enter="customText.trim() && saveCustom()"
                />
                <select
                  class="flex-1 min-w-0 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm"
                  @change="if ($event.target.value) { customText = $event.target.value; $event.target.selectedIndex = 0; }"
                >
                  <option value="" x-text="S.dishPickerPlaceholder"></option>
                  <template x-for="dish in sortedDishes()" :key="dish.id">
                    <option :value="dish.name" x-text="dish.name"></option>
                  </template>
                </select>
              </div>
              <label class="flex items-center gap-2 mb-2 cursor-pointer">
                <input type="checkbox" x-model="addToList" class="w-4 h-4 rounded accent-blue-500" />
                <span class="text-xs text-gray-400" x-text="S.addToListLabel"></span>
              </label>
              <button
                class="btn btn-primary w-full mb-3"
                :disabled="!customText.trim()"
                @click="saveCustom()"
                x-text="S.save"
              ></button>

              <div class="divider"></div>

              <!-- Quick-select -->
              <p class="section-label" x-text="S.quickSelect"></p>
              <div class="grid grid-cols-3 gap-2 mb-3">
                <button class="btn btn-neutral flex flex-col items-center gap-1 py-2.5" @click="setSpecial('nothing')">
                  <span class="text-xl">🚫</span>
                  <span class="text-xs" x-text="S.nothing"></span>
                </button>
                <button class="btn btn-warn flex flex-col items-center gap-1 py-2.5" @click="setSpecial('eating_out')">
                  <span class="text-xl">🍽️</span>
                  <span class="text-xs" x-text="S.eatingOut"></span>
                </button>
                <button class="btn btn-primary flex flex-col items-center gap-1 py-2.5" @click="setSpecial('order')">
                  <span class="text-xl">📦</span>
                  <span class="text-xs" x-text="S.order"></span>
                </button>
              </div>

              <!-- Surprise me -->
              <div class="flex gap-2 mb-3">
                <button
                  class="btn btn-violet flex-1 flex items-center justify-center gap-1.5"
                  @click="surpriseMe('themealdb')"
                  :disabled="surpriseLoading"
                >
                  <span x-show="!surpriseLoading">🎲 <span x-text="S.surpriseMe"></span></span>
                  <span x-show="surpriseLoading">⏳</span>
                </button>
                <button
                  class="btn btn-violet flex-1 flex items-center justify-center gap-1.5"
                  @click="surpriseMe('chefkoch')"
                  :disabled="surpriseLoading"
                >
                  <span x-show="!surpriseLoading">👨‍🍳 Chefkoch</span>
                  <span x-show="surpriseLoading">⏳</span>
                </button>
              </div>

              <!-- Surprise result -->
              <template x-if="surpriseResult">
                <div class="bg-violet-950 border border-violet-700 rounded-xl p-3 mb-3">
                  <div class="flex items-center gap-3 mb-2.5">
                    <img
                      x-show="surpriseResult.thumb"
                      :src="surpriseResult.thumb"
                      class="w-12 h-12 rounded-lg object-cover shrink-0"
                      alt=""
                    />
                    <div class="min-w-0">
                      <p class="font-semibold text-white text-sm" x-text="surpriseResult.name"></p>
                      <p class="text-xs text-gray-400" x-text="surpriseResult.category + (surpriseResult.area ? ' · ' + surpriseResult.area : '')"></p>
                      <a
                        x-show="surpriseResult.url"
                        :href="surpriseResult.url"
                        target="_blank"
                        class="text-xs text-blue-400 hover:underline"
                        x-text="S.viewRecipe"
                      ></a>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <button class="btn btn-success flex-1 text-sm" @click="acceptSurprise" x-text="S.accept + ' + ' + S.addToList"></button>
                    <button class="btn btn-neutral text-sm" @click="surpriseMe(surpriseSource)">🎲</button>
                    <button class="btn btn-danger text-sm" @click="surpriseResult = null">✕</button>
                  </div>
                </div>
              </template>

            </div>
          </template>

        </div>
      </template>
    </div>
  </div>

  <!-- ================================================================
       DISH MANAGER MODAL
  ================================================================ -->
  <div class="modal-overlay" x-show="showDishManager" x-transition @click.self="showDishManager = false">
    <div class="modal" x-show="showDishManager" x-transition>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white" x-text="S.dishManagerTitle"></h2>
        <button class="text-gray-500 hover:text-white text-2xl leading-none" @click="showDishManager = false">×</button>
      </div>

      <!-- Tab switcher -->
      <div class="flex gap-1 mb-4 bg-gray-900 rounded-xl p-1">
        <button
          class="flex-1 py-1.5 rounded-lg text-sm font-semibold transition-colors"
          :class="dishManagerTab === 'list' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
          @click="dishManagerTab = 'list'"
          x-text="S.tabList"
        ></button>
        <button
          class="flex-1 py-1.5 rounded-lg text-sm font-semibold transition-colors"
          :class="dishManagerTab === 'bulk' ? 'bg-gray-700 text-white' : 'text-gray-500 hover:text-gray-300'"
          @click="openBulkEdit()"
          x-text="S.tabBulk"
        ></button>
      </div>

      <!-- ── Tab: List view ── -->
      <template x-if="dishManagerTab === 'list'">
        <div>
          <!-- Add single -->
          <div class="flex gap-2 mb-4">
            <input
              type="text"
              x-model="newDishName"
              :placeholder="S.newDishPlaceholder"
              class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm"
              @keydown.enter="addDish()"
            />
            <button class="btn btn-success shrink-0" @click="addDish()" x-text="S.add"></button>
          </div>

          <!-- Dish list -->
          <div class="max-h-[55vh] overflow-y-auto space-y-1 pr-1">
            <template x-for="dish in allDishes" :key="dish.id">
              <div class="flex items-center gap-3 bg-gray-800 rounded-xl px-3 py-2.5">
                <div class="flex-1 min-w-0">
                  <p class="font-medium text-white text-sm truncate" x-text="dish.name"></p>
                  <p class="text-xs text-gray-500"
                    x-text="dish.blocked_until && dish.blocked_until > today
                      ? S.blockedUntil + ' ' + formatDate(dish.blocked_until)
                      : dish.last_used
                        ? S.lastCooked + ' ' + formatDate(dish.last_used) + ' · ' + dish.use_count + '×'
                        : S.neverCooked"
                  ></p>
                </div>
                <button
                  x-show="dish.blocked_until && dish.blocked_until > today"
                  class="btn btn-neutral text-xs px-2 py-1 shrink-0"
                  @click="unblockDish(dish)"
                  x-text="S.unblock"
                ></button>
                <button
                  class="text-gray-600 hover:text-red-400 transition-colors text-base shrink-0 ml-1"
                  @click="deleteDish(dish.id)"
                  :title="S.deleteDish"
                >✕</button>
              </div>
            </template>
            <template x-if="allDishes.length === 0">
              <p class="text-gray-500 italic text-sm text-center py-6" x-text="S.noDishes"></p>
            </template>
          </div>
        </div>
      </template>

      <!-- ── Tab: Bulk edit ── -->
      <template x-if="dishManagerTab === 'bulk'">
        <div>
          <p class="text-xs text-gray-500 mb-2" x-text="S.bulkHint"></p>
          <textarea
            x-model="bulkText"
            class="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm font-mono resize-none"
            rows="16"
            :placeholder="S.bulkPlaceholder"
          ></textarea>
          <div class="flex gap-2 mt-3">
            <button class="btn btn-primary flex-1" @click="saveBulk()" x-text="S.bulkSave"></button>
            <button class="btn btn-neutral" @click="dishManagerTab = 'list'" x-text="S.cancel"></button>
          </div>
        </div>
      </template>

    </div>
  </div>

  <script>
    // ── i18n strings ─────────────────────────────────────────────────────────
    const STRINGS_DE = {
      // Header
      today: 'Heute',
      notPlanned: 'Nicht geplant',
      manageDishes: 'Gerichtliste verwalten',
      downloadHistory: 'Historie als CSV',

      // Modal: planned state
      currentlyPlanned: 'Aktuell geplant',
      change: 'Ändern',
      delete: 'Löschen',

      // Suggestions
      suggestionsLabel: 'Vorschläge (am längsten nicht gekocht)',
      loadingSuggestions: 'Vorschläge werden geladen…',
      noMoreSuggestions: 'Keine weiteren Vorschläge – bitte eigenen Eintrag nutzen.',
      lastCooked: 'Zuletzt:',
      neverCooked: 'Noch nie gekocht',

      // Suggestion buttons
      accept: 'Nehmen',
      acceptTitle: 'Für diesen Tag einplanen',
      notToday: 'Nicht heute',
      notTodayTitle: 'Vorschlag überspringen (heute nicht, kommt bald wieder)',
      block: '2 Wochen nicht',
      blockTitle: 'Gericht für 2 Wochen nicht vorschlagen',

      // Quick select
      quickSelect: 'Schnellauswahl',
      nothing: 'Kein Kochen',
      eatingOut: 'Auswärts',
      order: 'Bestellen',

      // Surprise
      surpriseMe: 'Überrasch mich!',
      surpriseLoading: 'Lade Rezept…',
      viewRecipe: 'Rezept ansehen →',

      // Free text
      ownEntry: 'Eigener Eintrag',
      ownEntryPlaceholder: 'Gerichtname eingeben…',
      dishPickerPlaceholder: 'Aus Liste wählen…',
      addToListLabel: 'In Gerichtliste aufnehmen',
      addToList: 'in Liste',
      save: 'Speichern',

      // Type labels
      type_dish: 'Kochen',
      type_custom: 'Kochen',
      type_eating_out: 'Auswärts',
      type_order: 'Bestellen',
      type_nothing: 'Kein Kochen',

      // Dish manager
      dishManagerTitle: 'Gerichtliste',
      newDishPlaceholder: 'Neues Gericht…',
      add: '+ Hinzufügen',
      noDishes: 'Keine Gerichte vorhanden.',
      deleteDish: 'Gericht löschen',
      blockedUntil: 'Gesperrt bis:',
      unblock: 'Freigeben',
      tabList: 'Liste',
      tabBulk: 'Massenbearbeitung',
      bulkHint: 'Ein Gericht pro Zeile. Neue Zeilen werden hinzugefügt, gelöschte Zeilen werden entfernt. Historie & Sperren bleiben erhalten.',
      bulkPlaceholder: 'Spaghetti Bolognese\nHähnchen-Curry\n…',
      bulkSave: 'Speichern',
      cancel: 'Abbrechen',

      // Alerts & confirms
      errorPrefix: 'Fehler: ',
      errorNoRecipes: 'Keine Rezepte gefunden',
      confirmDeleteAllDishes: 'Wirklich alle Gerichte löschen?',
      confirmDeleteDish: 'Gericht wirklich löschen?',
      dishAlreadyExists: 'Dieses Gericht existiert bereits.',

      // Date & time
      weekdays: ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'],
      weekdaysLong: ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'],
      months: ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'],
      kwPrefix: 'KW',
    };

    const STRINGS_EN = {
      // Header
      today: 'Today',
      notPlanned: 'Not planned',
      manageDishes: 'Manage dish list',
      downloadHistory: 'History as CSV',

      // Modal: planned state
      currentlyPlanned: 'Currently planned',
      change: 'Change',
      delete: 'Delete',

      // Suggestions
      suggestionsLabel: 'Suggestions (least recently cooked)',
      loadingSuggestions: 'Loading suggestions…',
      noMoreSuggestions: 'No more suggestions – please use the custom entry.',
      lastCooked: 'Last:',
      neverCooked: 'Never cooked',

      // Suggestion buttons
      accept: 'Take',
      acceptTitle: 'Plan for this day',
      notToday: 'Not today',
      notTodayTitle: 'Skip suggestion (not today, will come back soon)',
      block: '2 weeks not',
      blockTitle: 'Do not suggest this dish for 2 weeks',

      // Quick select
      quickSelect: 'Quick select',
      nothing: 'No cooking',
      eatingOut: 'Eating out',
      order: 'Order',

      // Surprise
      surpriseMe: 'Surprise me!',
      surpriseLoading: 'Loading recipe…',
      viewRecipe: 'View recipe →',

      // Free text
      ownEntry: 'Custom entry',
      ownEntryPlaceholder: 'Enter dish name…',
      dishPickerPlaceholder: 'Choose from list…',
      addToListLabel: 'Add to dish list',
      addToList: 'to list',
      save: 'Save',

      // Type labels
      type_dish: 'Cooking',
      type_custom: 'Cooking',
      type_eating_out: 'Eating out',
      type_order: 'Order',
      type_nothing: 'No cooking',

      // Dish manager
      dishManagerTitle: 'Dish list',
      newDishPlaceholder: 'New dish…',
      add: '+ Add',
      noDishes: 'No dishes yet.',
      deleteDish: 'Delete dish',
      blockedUntil: 'Blocked until:',
      unblock: 'Unblock',
      tabList: 'List',
      tabBulk: 'Bulk edit',
      bulkHint: 'One dish per line. New lines are added, removed lines are deleted. History & blocks are preserved.',
      bulkPlaceholder: 'Spaghetti Bolognese\nChicken Curry\n…',
      bulkSave: 'Save',
      cancel: 'Cancel',

      // Alerts & confirms
      errorPrefix: 'Error: ',
      errorNoRecipes: 'No recipes found',
      confirmDeleteAllDishes: 'Really delete all dishes?',
      confirmDeleteDish: 'Really delete this dish?',
      dishAlreadyExists: 'This dish already exists.',

      // Date & time
      weekdays: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
      weekdaysLong: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
      months: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
      kwPrefix: 'W',
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    const API = '/api/meal_planner';

    function isoWeek(date) {
      const d = new Date(date);
      const day = d.getDay() === 0 ? 7 : d.getDay();
      d.setDate(d.getDate() + 4 - day);
      const yearStart = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay() === 0 ? 7 : d.getDay();
      d.setDate(d.getDate() - day + 1);
      return d;
    }

    function toISO(date) {
      // Use local date parts to avoid UTC-offset issues at midnight
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    // ── Alpine component ──────────────────────────────────────────────────────
    function mealPlanner() {
      return {
        lang: (navigator.language || 'de').startsWith('de') ? 'de' : 'en',
        get S() { return this.lang === 'de' ? STRINGS_DE : STRINGS_EN; },
        setLang(l) { this.lang = l; this.loadPlan(); },
        today: toISO(new Date()),

        // Week
        weekDays: [],
        plan: {},
        weekLabel: '',

        // Modal
        modalOpen: false,
        activeDay: null,
        editMode: false,
        suggestions: [],
        loadingSuggestions: false,
        rejecting: false,

        // Surprise
        surpriseResult: null,
        surpriseSource: 'themealdb',
        surpriseLoading: false,

        // Custom input
        customText: '',
        addToList: false,

        // Dish manager
        showDishManager: false,
        allDishes: [],
        newDishName: '',
        dishManagerTab: 'list',
        bulkText: '',

        // ── Init ──
        async init() {
          this.applyHATheme();
          await this.loadPlan();
        },

        applyHATheme() {
          try {
            if (window.parent === window) return; // not embedded in HA panel
            const ps = getComputedStyle(window.parent.document.documentElement);
            const get = v => ps.getPropertyValue(v).trim();
            const r = document.documentElement;
            const map = {
              '--mp-bg':         get('--primary-background-color') || get('--lovelace-background'),
              '--mp-surface':    get('--card-background-color') || get('--secondary-background-color'),
              '--mp-text':       get('--primary-text-color'),
              '--mp-text-muted': get('--secondary-text-color'),
              '--mp-border':     get('--divider-color'),
              '--mp-primary':    get('--primary-color'),
            };
            Object.entries(map).forEach(([k, v]) => { if (v) r.style.setProperty(k, v); });
          } catch(e) { /* cross-origin or standalone – keep dark defaults */ }
        },

        async loadPlan() {
          const today = new Date();
          const todayISO = toISO(today);
          const days = [];
          for (let i = -2; i <= 18; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() + i);
            const iso = toISO(d);
            const wi = (d.getDay() + 6) % 7; // 0=Mo … 6=So
            days.push({
              iso,
              weekday: this.S.weekdays[wi],
              weekdayLong: this.S.weekdaysLong[wi],
              dayNum: d.getDate(),
              month: this.S.months[d.getMonth()],
              isToday: iso === todayISO,
              label: `${this.S.weekdaysLong[wi]}, ${d.getDate()}. ${this.S.months[d.getMonth()]}`,
            });
          }
          this.weekDays = days;

          const s = days[0], e = days[days.length - 1];
          this.weekLabel = `${s.dayNum}. ${s.month} – ${e.dayNum}. ${e.month}`;

          try {
            const resp = await fetch(`${API}/plan?from=${days[0].iso}&to=${days[days.length - 1].iso}`);
            this.plan = await resp.json();
          } catch(err) {
            console.error('Failed to load plan', err);
            this.plan = {};
          }
        },

        // ── Day card styles ──
        dayCardClass(day) {
          const p = this.plan[day.iso];
          if (day.isToday) return p?.type === 'nothing' ? 'mp-day-today mp-day-nothing' : 'mp-day-today';
          if (!p) return 'mp-day-default';
          if (p.type === 'nothing') return 'mp-day-nothing';
          if (p.type === 'dish' || p.type === 'custom') return 'mp-day-dish';
          return 'mp-day-default';
        },
        typeTagClass(type) {
          const map = {
            dish:       'bg-green-900 text-green-300',
            custom:     'bg-green-900 text-green-300',
            eating_out: 'bg-amber-900 text-amber-300',
            order:      'bg-blue-900 text-blue-300',
            nothing:    'bg-gray-700 text-gray-400',
          };
          return map[type] || 'bg-gray-700 text-gray-400';
        },
        typeLabel(type) {
          return this.S[`type_${type}`] || type;
        },
        formatDate(iso) {
          if (!iso) return '';
          const [y, m, d] = iso.split('-');
          return `${d}.${m}.${y}`;
        },

        // ── Modal ──
        sortedDishes() {
          return this.allDishes.slice().sort((a, b) => a.name.localeCompare(b.name, 'de'));
        },

        async openDay(day) {
          this.activeDay = day;
          this.editMode = false;
          this.customText = '';
          this.addToList = false;
          this.surpriseResult = null;
          this.suggestions = [];
          this.modalOpen = true;
          this.loadDishes();
          if (!this.plan[day.iso]) {
            await this.loadSuggestions();
          }
        },
        closeModal() {
          this.modalOpen = false;
          this.editMode = false;
          this.surpriseResult = null;
        },
        async startEdit() {
          this.editMode = true;
          this.customText = '';
          this.surpriseResult = null;
          this.loadDishes();
          await this.loadSuggestions();
        },

        async loadSuggestions() {
          if (!this.activeDay) return;
          this.loadingSuggestions = true;
          try {
            const resp = await fetch(`${API}/suggest/${this.activeDay.iso}`);
            this.suggestions = await resp.json();
          } catch(e) {
            console.error('Failed to load suggestions', e);
            this.suggestions = [];
          } finally {
            this.loadingSuggestions = false;
          }
        },

        async acceptDish(dish) {
          await this.saveDay({ type: 'dish', dish_id: dish.id, dish_name: dish.name });
        },

        async rejectDish(dish, mode) {
          this.rejecting = true;
          try {
            const resp = await fetch(`${API}/suggest/${this.activeDay.iso}/reject`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ dish_id: dish.id, mode }),
            });
            this.suggestions = await resp.json();
          } catch(e) {
            console.error('Reject failed', e);
          } finally {
            this.rejecting = false;
          }
        },

        async setSpecial(type) {
          await this.saveDay({ type });
        },
        async saveCustom() {
          const name = this.customText.trim();
          if (!name) return;
          await this.saveDay({ type: 'custom', dish_name: name, add_to_list: this.addToList });
        },
        async acceptSurprise() {
          if (!this.surpriseResult) return;
          await this.saveDay({ type: 'custom', dish_name: this.surpriseResult.name, add_to_list: true });
        },

        async saveDay(payload) {
          try {
            const resp = await fetch(`${API}/plan/${this.activeDay.iso}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!resp.ok) throw new Error(await resp.text());
            const entry = await resp.json();
            this.plan[this.activeDay.iso] = entry;
            this.closeModal();
            this.advanceToNextUnplanned();
          } catch(e) {
            alert(this.S.errorPrefix + e.message);
          }
        },

        advanceToNextUnplanned() {
          const currentIdx = this.weekDays.findIndex(d => d.iso === this.activeDay?.iso);
          const after  = this.weekDays.slice(currentIdx + 1).find(d => !this.plan[d.iso]);
          const before = this.weekDays.slice(0, currentIdx).find(d => !this.plan[d.iso]);
          const next = after || before;
          if (next) setTimeout(() => { if (!this.modalOpen) this.openDay(next); }, 220);
        },

        async clearDay(iso) {
          try {
            await fetch(`${API}/plan/${iso}`, { method: 'DELETE' });
            const updated = { ...this.plan };
            delete updated[iso];
            this.plan = updated;
            this.closeModal();
          } catch(e) {
            console.error('Clear failed', e);
          }
        },

        // ── Surprise me ──
        async surpriseMe(source = 'themealdb') {
          this.surpriseSource = source;
          this.surpriseLoading = true;
          this.surpriseResult = null;
          try {
            if (source === 'chefkoch') {
              const resp = await fetch('/api/meal_planner/surprise/chefkoch');
              if (!resp.ok) throw new Error(this.S.errorNoRecipes);
              const meal = await resp.json();
              this.surpriseResult = {
                name: meal.name,
                thumb: meal.image || null,
                category: 'Chefkoch',
                area: '',
                url: meal.url || null,
              };
            } else {
              const resp = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
              const data = await resp.json();
              const meal = data?.meals?.[0];
              if (meal) {
                this.surpriseResult = {
                  name: meal.strMeal,
                  thumb: meal.strMealThumb,
                  category: meal.strCategory || '',
                  area: meal.strArea || '',
                  url: null,
                };
              }
            }
          } catch(e) {
            alert(this.S.errorNoRecipes + ': ' + e.message);
          } finally {
            this.surpriseLoading = false;
          }
        },

        // ── Dish manager ──
        async openDishManager() {
          this.showDishManager = true;
          this.dishManagerTab = 'list';
          await this.loadDishes();
        },
        openBulkEdit() {
          this.bulkText = this.allDishes.map(d => d.name).join('\n');
          this.dishManagerTab = 'bulk';
        },
        async saveBulk() {
          const newNames = this.bulkText
            .split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 0);

          if (newNames.length === 0 && !confirm(this.S.confirmDeleteAllDishes)) return;

          const existing = new Map(this.allDishes.map(d => [d.name.toLowerCase(), d]));
          const incoming = new Set(newNames.map(n => n.toLowerCase()));

          // Add new
          for (const name of newNames) {
            if (!existing.has(name.toLowerCase())) {
              await fetch(`${API}/dishes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name }),
              });
            }
          }
          // Remove deleted
          for (const [key, dish] of existing) {
            if (!incoming.has(key)) {
              await fetch(`${API}/dishes/${dish.id}`, { method: 'DELETE' });
            }
          }

          await this.loadDishes();
          this.dishManagerTab = 'list';
        },
        async loadDishes() {
          try {
            const resp = await fetch(`${API}/dishes`);
            this.allDishes = await resp.json();
          } catch(e) {
            console.error('Failed to load dishes', e);
          }
        },
        async addDish() {
          const name = this.newDishName.trim();
          if (!name) return;
          try {
            const resp = await fetch(`${API}/dishes`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name }),
            });
            if (resp.status === 409) { alert(this.S.dishAlreadyExists); return; }
            if (!resp.ok) throw new Error(await resp.text());
            this.newDishName = '';
            await this.loadDishes();
          } catch(e) {
            alert(this.S.errorPrefix + e.message);
          }
        },
        async deleteDish(id) {
          if (!confirm(this.S.confirmDeleteDish)) return;
          try {
            await fetch(`${API}/dishes/${id}`, { method: 'DELETE' });
            await this.loadDishes();
          } catch(e) {
            console.error('Delete failed', e);
          }
        },
        async unblockDish(dish) {
          // Unblock = set blocked_until to null via a PATCH-like POST trick
          // We'll call a dedicated endpoint we add, or do it inline
          // For now: re-use the dishes list endpoint with a PUT
          // Since we don't have a PATCH endpoint yet, we'll reload to show change
          // TODO: add PATCH /api/meal_planner/dishes/{id} in next iteration
          // For now, just reload
          try {
            const resp = await fetch(`${API}/dishes/${dish.id}/unblock`, { method: 'POST' });
            if (resp.ok) await this.loadDishes();
          } catch(e) {
            console.error('Unblock failed', e);
          }
        },
      };
    }
  </script>
