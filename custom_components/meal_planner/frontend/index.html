<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Meal Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    body {
      background: #111827;
      color: #f9fafb;
      font-family: ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
    }

    .day-card {
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
    }
    .day-card:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .day-card:active { transform: scale(0.97); }

    .btn {
      border-radius: 0.75rem;
      font-weight: 600;
      padding: 0.55rem 1rem;
      transition: background 0.12s, transform 0.1s;
      cursor: pointer;
      border: none;
      font-size: 0.875rem;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary  { background: #2563eb; color: #fff; }
    .btn-primary:hover  { background: #1d4ed8; }
    .btn-success  { background: #16a34a; color: #fff; }
    .btn-success:hover  { background: #15803d; }
    .btn-warn     { background: #d97706; color: #fff; }
    .btn-warn:hover     { background: #b45309; }
    .btn-danger   { background: #dc2626; color: #fff; }
    .btn-danger:hover   { background: #b91c1c; }
    .btn-neutral  { background: #374151; color: #f3f4f6; }
    .btn-neutral:hover  { background: #4b5563; }
    .btn-violet   { background: #7c3aed; color: #fff; }
    .btn-violet:hover   { background: #6d28d9; }

    .suggestion-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 1rem;
      padding: 0.75rem 0.875rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.12s;
    }
    .suggestion-card:hover { border-color: #6b7280; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: #1f2937;
      border-radius: 1.25rem;
      width: 100%; max-width: 540px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    .tag {
      display: inline-block;
      border-radius: 9999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .divider {
      border-top: 1px solid #374151;
      margin: 1rem 0;
    }

    /* Tooltip for reject buttons */
    .reject-btn-group {
      display: flex;
      gap: 0.375rem;
      shrink: 0;
    }
  </style>
</head>
<body x-data="mealPlanner()" x-init="init()" x-cloak>

  <div class="max-w-4xl mx-auto px-3 py-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-4 gap-2">
      <div class="min-w-0">
        <h1 class="text-xl font-bold text-white leading-tight">🍽️ Meal Planner</h1>
        <p class="text-gray-500 text-xs mt-0.5 truncate" x-text="weekLabel"></p>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button class="btn btn-neutral px-3" @click="prevWeek">‹</button>
        <button class="btn btn-neutral px-3" @click="goToday" x-text="S.today"></button>
        <button class="btn btn-neutral px-3" @click="nextWeek">›</button>
      </div>
    </div>

    <!-- Week grid — 1 col on small, 3 col on medium+, 4 col on large -->
    <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-2.5">
      <template x-for="day in weekDays" :key="day.iso">
        <div
          class="day-card rounded-2xl px-3.5 py-3 flex flex-col gap-1"
          :class="dayCardClass(day)"
          @click="openDay(day)"
        >
          <!-- Date row -->
          <div class="flex items-baseline justify-between">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide" x-text="day.weekday"></span>
            <span
              class="text-lg font-bold leading-none"
              :class="day.isToday ? 'text-blue-400' : 'text-white'"
              x-text="day.dayNum"
            ></span>
          </div>

          <!-- Meal status -->
          <template x-if="plan[day.iso]">
            <div>
              <span class="tag" :class="typeTagClass(plan[day.iso].type)" x-text="typeLabel(plan[day.iso].type)"></span>
              <p
                class="text-sm font-medium text-white mt-1 leading-tight line-clamp-2"
                x-text="plan[day.iso].dish_name || ''"
                x-show="plan[day.iso].dish_name"
              ></p>
            </div>
          </template>
          <template x-if="!plan[day.iso]">
            <p class="text-xs text-gray-600 italic" x-text="S.notPlanned"></p>
          </template>
        </div>
      </template>
    </div>

    <!-- Footer link -->
    <div class="mt-5 text-center">
      <button class="text-gray-600 text-xs hover:text-gray-400 underline" @click="openDishManager()" x-text="S.manageDishes"></button>
    </div>
  </div>

  <!-- ================================================================
       DAY PLANNING MODAL
  ================================================================ -->
  <div class="modal-overlay" x-show="modalOpen" x-transition @click.self="closeModal">
    <div class="modal" x-show="modalOpen" x-transition>

      <!-- Modal header -->
      <div class="flex items-start justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-white leading-tight" x-text="activeDay?.label"></h2>
          <p class="text-gray-500 text-xs mt-0.5" x-text="activeDay?.iso"></p>
        </div>
        <button class="text-gray-500 hover:text-white text-2xl leading-none ml-3 shrink-0" @click="closeModal">×</button>
      </div>

      <!-- ── Already planned: show summary + change/delete ── -->
      <template x-if="plan[activeDay?.iso] && !editMode">
        <div>
          <div class="bg-gray-800 rounded-xl p-3.5 mb-3">
            <p class="text-xs text-gray-500 mb-1" x-text="S.currentlyPlanned"></p>
            <span class="tag" :class="typeTagClass(plan[activeDay?.iso]?.type)" x-text="typeLabel(plan[activeDay?.iso]?.type)"></span>
            <span class="ml-2 font-semibold text-white text-sm" x-text="plan[activeDay?.iso]?.dish_name"></span>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-neutral flex-1" @click="startEdit()" x-text="S.change"></button>
            <button class="btn btn-danger" @click="clearDay(activeDay.iso)" x-text="S.delete"></button>
          </div>
        </div>
      </template>

      <!-- ── Planning UI ── -->
      <template x-if="!plan[activeDay?.iso] || editMode">
        <div>

          <!-- Loading -->
          <template x-if="loadingSuggestions">
            <div class="text-center py-8 text-gray-500">
              <div class="text-3xl mb-2">⏳</div>
              <p x-text="S.loadingSuggestions"></p>
            </div>
          </template>

          <template x-if="!loadingSuggestions">
            <div>

              <!-- Suggestions -->
              <p class="section-label" x-text="S.suggestionsLabel"></p>

              <template x-for="dish in suggestions" :key="dish.id">
                <div class="suggestion-card">
                  <!-- Dish info -->
                  <div class="flex items-start justify-between gap-3 mb-2">
                    <div class="min-w-0">
                      <p class="font-semibold text-white text-sm leading-snug" x-text="dish.name"></p>
                      <p class="text-xs text-gray-500 mt-0.5"
                        x-text="dish.last_used
                          ? S.lastCooked + ' ' + formatDate(dish.last_used)
                          : S.neverCooked"
                      ></p>
                    </div>
                  </div>
                  <!-- Action buttons -->
                  <div class="flex gap-1.5">
                    <!-- Accept -->
                    <button
                      class="btn btn-success flex-1 text-xs"
                      @click="acceptDish(dish)"
                      :title="S.acceptTitle"
                    >✓ <span x-text="S.accept"></span></button>

                    <!-- Not today (session skip) -->
                    <button
                      class="btn btn-neutral text-xs px-2"
                      @click="rejectDish(dish, 'session')"
                      :disabled="rejecting"
                      :title="S.notTodayTitle"
                    >↷ <span x-text="S.notToday"></span></button>

                    <!-- Block 2 weeks -->
                    <button
                      class="btn btn-danger text-xs px-2"
                      @click="rejectDish(dish, 'temporary')"
                      :disabled="rejecting"
                      :title="S.blockTitle"
                    >✕ <span x-text="S.block"></span></button>
                  </div>
                </div>
              </template>

              <template x-if="suggestions.length === 0">
                <p class="text-gray-500 italic text-sm py-2 text-center" x-text="S.noMoreSuggestions"></p>
              </template>

              <div class="divider"></div>

              <!-- Quick-select -->
              <p class="section-label" x-text="S.quickSelect"></p>
              <div class="grid grid-cols-3 gap-2 mb-3">
                <button class="btn btn-neutral flex flex-col items-center gap-1 py-2.5" @click="setSpecial('nothing')">
                  <span class="text-xl">🚫</span>
                  <span class="text-xs" x-text="S.nothing"></span>
                </button>
                <button class="btn btn-warn flex flex-col items-center gap-1 py-2.5" @click="setSpecial('eating_out')">
                  <span class="text-xl">🍽️</span>
                  <span class="text-xs" x-text="S.eatingOut"></span>
                </button>
                <button class="btn btn-primary flex flex-col items-center gap-1 py-2.5" @click="setSpecial('order')">
                  <span class="text-xl">📦</span>
                  <span class="text-xs" x-text="S.order"></span>
                </button>
              </div>

              <!-- Surprise me -->
              <button
                class="btn btn-violet w-full mb-3 flex items-center justify-center gap-2"
                @click="surpriseMe"
                :disabled="surpriseLoading"
              >
                <span x-show="!surpriseLoading">🎲 <span x-text="S.surpriseMe"></span></span>
                <span x-show="surpriseLoading">⏳ <span x-text="S.surpriseLoading"></span></span>
              </button>

              <!-- Surprise result -->
              <template x-if="surpriseResult">
                <div class="bg-violet-950 border border-violet-700 rounded-xl p-3 mb-3">
                  <div class="flex items-center gap-3 mb-2.5">
                    <img
                      x-show="surpriseResult.thumb"
                      :src="surpriseResult.thumb"
                      class="w-12 h-12 rounded-lg object-cover shrink-0"
                      alt=""
                    />
                    <div class="min-w-0">
                      <p class="font-semibold text-white text-sm" x-text="surpriseResult.name"></p>
                      <p class="text-xs text-gray-400" x-text="surpriseResult.category + (surpriseResult.area ? ' · ' + surpriseResult.area : '')"></p>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <button class="btn btn-success flex-1 text-sm" @click="acceptSurprise" x-text="S.accept + ' + ' + S.addToList"></button>
                    <button class="btn btn-neutral text-sm" @click="surpriseMe">🎲</button>
                    <button class="btn btn-danger text-sm" @click="surpriseResult = null">✕</button>
                  </div>
                </div>
              </template>

              <div class="divider"></div>

              <!-- Free text -->
              <p class="section-label" x-text="S.ownEntry"></p>
              <input
                type="text"
                x-model="customText"
                :placeholder="S.ownEntryPlaceholder"
                class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm mb-2"
                @keydown.enter="customText.trim() && saveCustom()"
              />
              <label class="flex items-center gap-2 mb-3 cursor-pointer">
                <input type="checkbox" x-model="addToList" class="w-4 h-4 rounded accent-blue-500" />
                <span class="text-xs text-gray-400" x-text="S.addToListLabel"></span>
              </label>
              <button
                class="btn btn-primary w-full"
                :disabled="!customText.trim()"
                @click="saveCustom()"
                x-text="S.save"
              ></button>

            </div>
          </template>

        </div>
      </template>
    </div>
  </div>

  <!-- ================================================================
       DISH MANAGER MODAL
  ================================================================ -->
  <div class="modal-overlay" x-show="showDishManager" x-transition @click.self="showDishManager = false">
    <div class="modal" x-show="showDishManager" x-transition>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white" x-text="S.dishManagerTitle"></h2>
        <button class="text-gray-500 hover:text-white text-2xl leading-none" @click="showDishManager = false">×</button>
      </div>

      <!-- Add -->
      <div class="flex gap-2 mb-4">
        <input
          type="text"
          x-model="newDishName"
          :placeholder="S.newDishPlaceholder"
          class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm"
          @keydown.enter="addDish()"
        />
        <button class="btn btn-success shrink-0" @click="addDish()" x-text="S.add"></button>
      </div>

      <!-- List -->
      <div class="max-h-[60vh] overflow-y-auto space-y-1 pr-1">
        <template x-for="dish in allDishes" :key="dish.id">
          <div class="flex items-center gap-3 bg-gray-800 rounded-xl px-3 py-2.5">
            <div class="flex-1 min-w-0">
              <p class="font-medium text-white text-sm truncate" x-text="dish.name"></p>
              <p class="text-xs text-gray-500"
                x-text="dish.blocked_until && dish.blocked_until > today
                  ? S.blockedUntil + ' ' + formatDate(dish.blocked_until)
                  : dish.last_used
                    ? S.lastCooked + ' ' + formatDate(dish.last_used) + ' · ' + dish.use_count + '×'
                    : S.neverCooked"
              ></p>
            </div>
            <!-- Unblock button if temporarily blocked -->
            <button
              x-show="dish.blocked_until && dish.blocked_until > today"
              class="btn btn-neutral text-xs px-2 py-1 shrink-0"
              @click="unblockDish(dish)"
              x-text="S.unblock"
            ></button>
            <button
              class="text-gray-600 hover:text-red-400 transition-colors text-base shrink-0 ml-1"
              @click="deleteDish(dish.id)"
              :title="S.deleteDish"
            >✕</button>
          </div>
        </template>
        <template x-if="allDishes.length === 0">
          <p class="text-gray-500 italic text-sm text-center py-6" x-text="S.noDishes"></p>
        </template>
      </div>
    </div>
  </div>

  <script>
    // ── i18n strings ─────────────────────────────────────────────────────────
    // To add a language: copy this object, translate all values, then swap it in.
    const STRINGS = {
      // Header
      today: 'Heute',
      notPlanned: 'Nicht geplant',
      manageDishes: 'Gerichtliste verwalten',

      // Modal: planned state
      currentlyPlanned: 'Aktuell geplant',
      change: 'Ändern',
      delete: 'Löschen',

      // Suggestions
      suggestionsLabel: 'Vorschläge (am längsten nicht gekocht)',
      loadingSuggestions: 'Vorschläge werden geladen…',
      noMoreSuggestions: 'Keine weiteren Vorschläge – bitte eigenen Eintrag nutzen.',
      lastCooked: 'Zuletzt:',
      neverCooked: 'Noch nie gekocht',

      // Suggestion buttons
      accept: 'Nehmen',
      acceptTitle: 'Für diesen Tag einplanen',
      notToday: 'Nicht heute',
      notTodayTitle: 'Vorschlag überspringen (heute nicht, kommt bald wieder)',
      block: '2 Wochen nicht',
      blockTitle: 'Gericht für 2 Wochen nicht vorschlagen',

      // Quick select
      quickSelect: 'Schnellauswahl',
      nothing: 'Kein Kochen',
      eatingOut: 'Auswärts',
      order: 'Bestellen',

      // Surprise
      surpriseMe: 'Überrasch mich!',
      surpriseLoading: 'Lade Rezept…',

      // Free text
      ownEntry: 'Eigener Eintrag',
      ownEntryPlaceholder: 'Gerichtname eingeben…',
      addToListLabel: 'In Gerichtliste aufnehmen',
      addToList: 'in Liste',
      save: 'Speichern',

      // Type labels
      type_dish: 'Kochen',
      type_custom: 'Kochen',
      type_eating_out: 'Auswärts',
      type_order: 'Bestellen',
      type_nothing: 'Kein Kochen',

      // Dish manager
      dishManagerTitle: 'Gerichtliste',
      newDishPlaceholder: 'Neues Gericht…',
      add: '+ Hinzufügen',
      noDishes: 'Keine Gerichte vorhanden.',
      deleteDish: 'Gericht löschen',
      blockedUntil: 'Gesperrt bis:',
      unblock: 'Freigeben',

      // Week
      weekdays: ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'],
      weekdaysLong: ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'],
      months: ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'],
      kwPrefix: 'KW',
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    const API = '/api/meal_planner';

    function isoWeek(date) {
      const d = new Date(date);
      const day = d.getDay() === 0 ? 7 : d.getDay();
      d.setDate(d.getDate() + 4 - day);
      const yearStart = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay() === 0 ? 7 : d.getDay();
      d.setDate(d.getDate() - day + 1);
      return d;
    }

    function toISO(date) {
      return date.toISOString().slice(0, 10);
    }

    // ── Alpine component ──────────────────────────────────────────────────────
    function mealPlanner() {
      return {
        S: STRINGS,
        today: toISO(new Date()),

        // Week
        monday: null,
        weekDays: [],
        plan: {},
        weekLabel: '',

        // Modal
        modalOpen: false,
        activeDay: null,
        editMode: false,
        suggestions: [],
        loadingSuggestions: false,
        rejecting: false,

        // Surprise
        surpriseResult: null,
        surpriseLoading: false,

        // Custom input
        customText: '',
        addToList: false,

        // Dish manager
        showDishManager: false,
        allDishes: [],
        newDishName: '',

        // ── Init ──
        async init() {
          this.monday = getMonday(new Date());
          await this.loadWeek();
        },

        async loadWeek() {
          const days = [];
          const todayISO = toISO(new Date());
          for (let i = 0; i < 7; i++) {
            const d = new Date(this.monday);
            d.setDate(d.getDate() + i);
            const iso = toISO(d);
            days.push({
              iso,
              weekday: STRINGS.weekdays[i],
              weekdayLong: STRINGS.weekdaysLong[i],
              dayNum: d.getDate(),
              month: STRINGS.months[d.getMonth()],
              isToday: iso === todayISO,
              label: `${STRINGS.weekdaysLong[i]}, ${d.getDate()}. ${STRINGS.months[d.getMonth()]}`,
            });
          }
          this.weekDays = days;

          const kw = isoWeek(this.monday);
          const year = this.monday.getFullYear();
          const end = days[6];
          this.weekLabel = `${STRINGS.kwPrefix} ${kw} · ${this.monday.getDate()}. ${STRINGS.months[this.monday.getMonth()]} – ${end.dayNum}. ${end.month} ${year}`;

          const weekParam = `${year}-W${String(kw).padStart(2, '0')}`;
          try {
            const resp = await fetch(`${API}/plan?week=${weekParam}`);
            this.plan = await resp.json();
          } catch(e) {
            console.error('Failed to load plan', e);
            this.plan = {};
          }
        },

        prevWeek() {
          const d = new Date(this.monday);
          d.setDate(d.getDate() - 7);
          this.monday = d;
          this.loadWeek();
        },
        nextWeek() {
          const d = new Date(this.monday);
          d.setDate(d.getDate() + 7);
          this.monday = d;
          this.loadWeek();
        },
        goToday() {
          this.monday = getMonday(new Date());
          this.loadWeek();
        },

        // ── Day card styles ──
        dayCardClass(day) {
          const p = this.plan[day.iso];
          if (!p) return day.isToday
            ? 'bg-blue-950 border border-blue-700'
            : 'bg-gray-800 border border-gray-700';
          const map = {
            nothing:    'bg-gray-900 border border-gray-700 opacity-60',
            eating_out: 'bg-amber-950 border border-amber-800',
            order:      'bg-blue-950 border border-blue-800',
          };
          return map[p.type] || 'bg-gray-800 border border-green-800';
        },
        typeTagClass(type) {
          const map = {
            dish:       'bg-green-900 text-green-300',
            custom:     'bg-green-900 text-green-300',
            eating_out: 'bg-amber-900 text-amber-300',
            order:      'bg-blue-900 text-blue-300',
            nothing:    'bg-gray-700 text-gray-400',
          };
          return map[type] || 'bg-gray-700 text-gray-400';
        },
        typeLabel(type) {
          return STRINGS[`type_${type}`] || type;
        },
        formatDate(iso) {
          if (!iso) return '';
          const [y, m, d] = iso.split('-');
          return `${d}.${m}.${y}`;
        },

        // ── Modal ──
        async openDay(day) {
          this.activeDay = day;
          this.editMode = false;
          this.customText = '';
          this.addToList = false;
          this.surpriseResult = null;
          this.suggestions = [];
          this.modalOpen = true;
          if (!this.plan[day.iso]) {
            await this.loadSuggestions();
          }
        },
        closeModal() {
          this.modalOpen = false;
          this.editMode = false;
          this.surpriseResult = null;
        },
        async startEdit() {
          this.editMode = true;
          this.customText = '';
          this.surpriseResult = null;
          await this.loadSuggestions();
        },

        async loadSuggestions() {
          if (!this.activeDay) return;
          this.loadingSuggestions = true;
          try {
            const resp = await fetch(`${API}/suggest/${this.activeDay.iso}`);
            this.suggestions = await resp.json();
          } catch(e) {
            console.error('Failed to load suggestions', e);
            this.suggestions = [];
          } finally {
            this.loadingSuggestions = false;
          }
        },

        async acceptDish(dish) {
          await this.saveDay({ type: 'dish', dish_id: dish.id, dish_name: dish.name });
        },

        async rejectDish(dish, mode) {
          this.rejecting = true;
          try {
            const resp = await fetch(`${API}/suggest/${this.activeDay.iso}/reject`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ dish_id: dish.id, mode }),
            });
            this.suggestions = await resp.json();
          } catch(e) {
            console.error('Reject failed', e);
          } finally {
            this.rejecting = false;
          }
        },

        async setSpecial(type) {
          await this.saveDay({ type });
        },
        async saveCustom() {
          const name = this.customText.trim();
          if (!name) return;
          await this.saveDay({ type: 'custom', dish_name: name, add_to_list: this.addToList });
        },
        async acceptSurprise() {
          if (!this.surpriseResult) return;
          await this.saveDay({ type: 'custom', dish_name: this.surpriseResult.name, add_to_list: true });
        },

        async saveDay(payload) {
          try {
            const resp = await fetch(`${API}/plan/${this.activeDay.iso}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!resp.ok) throw new Error(await resp.text());
            const entry = await resp.json();
            this.plan[this.activeDay.iso] = entry;
            this.closeModal();
            this.advanceToNextUnplanned();
          } catch(e) {
            alert('Fehler: ' + e.message);
          }
        },

        advanceToNextUnplanned() {
          const next = this.weekDays.find(d => !this.plan[d.iso]);
          if (next) setTimeout(() => this.openDay(next), 220);
        },

        async clearDay(iso) {
          try {
            await fetch(`${API}/plan/${iso}`, { method: 'DELETE' });
            delete this.plan[iso];
            this.closeModal();
          } catch(e) {
            console.error('Clear failed', e);
          }
        },

        // ── Surprise me (TheMealDB) ──
        async surpriseMe() {
          this.surpriseLoading = true;
          this.surpriseResult = null;
          try {
            const resp = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
            const data = await resp.json();
            const meal = data?.meals?.[0];
            if (meal) {
              this.surpriseResult = {
                name: meal.strMeal,
                thumb: meal.strMealThumb,
                category: meal.strCategory || '',
                area: meal.strArea || '',
              };
            }
          } catch(e) {
            alert('TheMealDB nicht erreichbar. Bitte Internetverbindung prüfen.');
          } finally {
            this.surpriseLoading = false;
          }
        },

        // ── Dish manager ──
        async openDishManager() {
          this.showDishManager = true;
          await this.loadDishes();
        },
        async loadDishes() {
          try {
            const resp = await fetch(`${API}/dishes`);
            this.allDishes = await resp.json();
          } catch(e) {
            console.error('Failed to load dishes', e);
          }
        },
        async addDish() {
          const name = this.newDishName.trim();
          if (!name) return;
          try {
            const resp = await fetch(`${API}/dishes`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name }),
            });
            if (resp.status === 409) { alert('Dieses Gericht existiert bereits.'); return; }
            if (!resp.ok) throw new Error(await resp.text());
            this.newDishName = '';
            await this.loadDishes();
          } catch(e) {
            alert('Fehler: ' + e.message);
          }
        },
        async deleteDish(id) {
          if (!confirm('Gericht wirklich löschen?')) return;
          try {
            await fetch(`${API}/dishes/${id}`, { method: 'DELETE' });
            await this.loadDishes();
          } catch(e) {
            console.error('Delete failed', e);
          }
        },
        async unblockDish(dish) {
          // Unblock = set blocked_until to null via a PATCH-like POST trick
          // We'll call a dedicated endpoint we add, or do it inline
          // For now: re-use the dishes list endpoint with a PUT
          // Since we don't have a PATCH endpoint yet, we'll reload to show change
          // TODO: add PATCH /api/meal_planner/dishes/{id} in next iteration
          // For now, just reload
          try {
            const resp = await fetch(`${API}/dishes/${dish.id}/unblock`, { method: 'POST' });
            if (resp.ok) await this.loadDishes();
          } catch(e) {
            console.error('Unblock failed', e);
          }
        },
      };
    }
  </script>
</body>
</html>
